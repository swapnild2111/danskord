<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dansk Ord — 1000 Essential Danish Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fredoka:wght@500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --sidebar-bg: #12171f;
    --card-front: #1c2333;
    --card-back: #1a2744;
    --border: #2a3347;
    --accent: #4f8ef7;
    --accent2: #7dd3fc;
    --text: #e8edf5;
    --text-muted: #8896ae;
    --text-dim: #4a5568;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 12px;
    --card-radius: 16px;
    --sidebar-w: 220px;
    --header-h: 58px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { height: var(--header-h); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; background: rgba(14,17,23,0.95); backdrop-filter: blur(12px); z-index: 200; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .stat-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
  .stat-pill b { color: var(--accent2); font-weight: 500; }
  .btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); padding: 6px 14px; font-family: 'Inter', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-shuffle { background: linear-gradient(135deg, #3b5fc0, #4f8ef7); border: none; color: white; }
  .btn-shuffle:hover { opacity: 0.88; color: white; }
  .btn-reset { border-color: #3a2020; }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

  /* SHELL */
  .shell { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); position: fixed; top: var(--header-h); left: 0; bottom: 0; overflow-y: auto; padding: 16px 0 40px; z-index: 100; }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar-title { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); padding: 0 16px 10px; }
  .cat-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; cursor: pointer; transition: background 0.12s; border-left: 3px solid transparent; gap: 8px; }
  .cat-item:hover { background: rgba(79,142,247,0.07); }
  .cat-item.active { background: rgba(79,142,247,0.12); border-left-color: var(--accent); }
  .cat-icon { font-size: 14px; flex-shrink: 0; }
  .cat-name { font-size: 12.5px; color: var(--text-muted); flex: 1; }
  .cat-item.active .cat-name { color: var(--accent2); font-weight: 500; }
  .cat-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); background: var(--surface); border-radius: 8px; padding: 1px 6px; flex-shrink: 0; }
  .cat-item.active .cat-count { background: rgba(79,142,247,0.2); color: var(--accent); }
  .cat-divider { height: 1px; background: var(--border); margin: 6px 16px; }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { position: sticky; top: var(--header-h); z-index: 90; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 10px; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 7px 10px 7px 32px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  /* PROGRESS */
  .progress-bar-wrap { padding: 8px 24px 0; background: var(--surface); border-bottom: 1px solid var(--border); }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
  .progress-track { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.35s ease; }

  /* SECTION HEADING */
  .section-heading { padding: 18px 24px 4px; display: flex; align-items: baseline; gap: 12px; }
  .section-heading h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); font-weight: 400; }
  .section-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

  /* GRID */
  .grid-container { padding: 12px 24px 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }

  /* FLIP CARD */
  .card-wrap { perspective: 800px; height: 148px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1); }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; border-radius: var(--card-radius); backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 14px; border: 1px solid var(--border); transition: border-color 0.2s, box-shadow 0.2s; }
  .card-wrap:hover .card-face { border-color: #3a4a66; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-front { background: var(--card-front); }
  .card-back { background: var(--card-back); transform: rotateY(180deg); border-color: #2a3d6a; }
  .card-wrap.flipped .card-back { border-color: var(--accent); }
  .danish-word { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); text-align: center; line-height: 1.2; margin-bottom: 5px; }
  .word-type { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .card-num { position: absolute; top: 9px; right: 11px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .adult-speaker-btn { position: absolute; top: 7px; left: 9px; width: 24px; height: 24px; border-radius: 50%; background: transparent; border: 1px solid var(--border); color: var(--text-dim); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.15s; line-height: 1; }
  .adult-speaker-btn:hover { border-color: var(--accent); color: var(--accent2); transform: scale(1.1); }
  .adult-speaker-btn:active { transform: scale(0.92); }
  .english-word { font-size: 17px; font-weight: 500; color: var(--accent2); text-align: center; }
  .known-dot { position: absolute; bottom: 9px; right: 11px; width: 16px; height: 16px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #0a2010; opacity: 0; transition: opacity 0.25s; }
  .card-wrap.known .known-dot { opacity: 1; }

  /* VERB MODE — taller cards with conjugation block on back */
  body.mode-verbs .card-wrap { height: 200px; }
  body.mode-verbs .grid-container { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .verb-conj { display: grid; grid-template-columns: auto 1fr; column-gap: 10px; row-gap: 4px; font-size: 12px; width: 100%; padding: 0 4px; margin-top: 6px; }
  .verb-conj-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; text-align: right; align-self: center; }
  .verb-conj-form { color: var(--text); font-weight: 500; font-family: 'Inter', sans-serif; font-size: 13px; }
  .verb-conj-form.aux-er { color: var(--accent2); }
  .verb-en { font-size: 13px; color: var(--accent2); text-align: center; padding: 10px 6px 4px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 8px; width: 100%; font-style: italic; }
  body.mode-verbs .danish-word { font-size: 24px; }
  body.mode-verbs .card-back { padding: 14px 10px; justify-content: flex-start; }
  body.mode-verbs .card-back .card-num { display: none; }

  /* MODE TOGGLE */
  .mode-toggle { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px; margin-right: 4px; }
  .mode-toggle button { background: transparent; border: none; color: var(--text-muted); padding: 5px 14px; font-family: 'Inter', sans-serif; font-size: 12px; cursor: pointer; border-radius: 18px; transition: all 0.18s; }
  .mode-toggle button.active { background: var(--accent); color: #fff; }

  /* ════════════════════════════════════════════════════════════════════
     KIDS MODE — bright, playful, audio-first UI for ages 5-7
     ════════════════════════════════════════════════════════════════════ */
  body.mode-kids { background: linear-gradient(180deg, #fff8e7 0%, #ffe9f0 100%); color: #2d2a4a; }
  body.mode-kids header { background: rgba(255,255,255,0.92); border-bottom: 2px solid #ffd9a8; }
  body.mode-kids .logo, body.mode-kids .logo span { color: #ff7a59; }
  body.mode-kids .stat-pill { background: #fff; border-color: #ffd9a8; color: #6b5b8a; font-family: 'Fredoka', sans-serif; font-weight: 500; }
  body.mode-kids .stat-pill b { color: #ff7a59; }
  body.mode-kids .btn { background: #fff; border-color: #ffd9a8; color: #6b5b8a; font-family: 'Fredoka', sans-serif; font-weight: 500; }
  body.mode-kids .btn:hover { border-color: #ff7a59; color: #ff7a59; }
  body.mode-kids .btn-shuffle { background: linear-gradient(135deg, #ff9a7a, #ff7a59); color: #fff; }
  body.mode-kids .mode-toggle { background: #fff; border-color: #ffd9a8; }
  body.mode-kids .mode-toggle button { color: #6b5b8a; font-family: 'Fredoka', sans-serif; font-weight: 500; }
  body.mode-kids .mode-toggle button.active { background: #ff7a59; color: #fff; }

  body.mode-kids .sidebar { background: #fff; border-right: 2px solid #ffd9a8; }
  body.mode-kids .sidebar-title { color: #b8a0c0; }
  body.mode-kids .cat-name { color: #6b5b8a; font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; }
  body.mode-kids .cat-icon { font-size: 22px; }
  body.mode-kids .cat-item { padding: 10px 16px; }
  body.mode-kids .cat-item:hover { background: #fff5e9; }
  body.mode-kids .cat-item.active { background: #fff0e0; border-left-color: #ff7a59; }
  body.mode-kids .cat-item.active .cat-name { color: #ff7a59; }
  body.mode-kids .cat-count { background: #fff5e9; color: #b8a0c0; font-family: 'Fredoka', sans-serif; }
  body.mode-kids .cat-item.active .cat-count { background: #ffe0d0; color: #ff7a59; }

  body.mode-kids .topbar { background: rgba(255,255,255,0.85); border-bottom: 2px solid #ffd9a8; }
  body.mode-kids input[type="text"] { background: #fff; border-color: #ffd9a8; color: #2d2a4a; font-family: 'Fredoka', sans-serif; font-size: 15px; padding: 10px 12px 10px 36px; border-radius: 22px; }
  body.mode-kids input[type="text"]:focus { border-color: #ff7a59; }
  body.mode-kids input[type="text"]::placeholder { color: #b8a0c0; }
  body.mode-kids .search-wrap svg { color: #b8a0c0; }

  body.mode-kids .progress-bar-wrap { background: rgba(255,255,255,0.85); border-bottom: 2px solid #ffd9a8; }
  body.mode-kids .progress-info { color: #6b5b8a; font-family: 'Fredoka', sans-serif; font-weight: 500; }
  body.mode-kids .progress-track { background: #ffe9d4; height: 8px; border-radius: 8px; }
  body.mode-kids .progress-fill { background: linear-gradient(90deg, #ff9a7a, #ff7a59); border-radius: 8px; }

  body.mode-kids .section-heading h2 { font-family: 'Fredoka', sans-serif; font-weight: 700; color: #2d2a4a; font-size: 28px; }
  body.mode-kids .section-count { color: #b8a0c0; font-family: 'Fredoka', sans-serif; }

  /* Kid card grid: bigger cards, more space */
  body.mode-kids .grid-container { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; padding: 16px 24px 80px; }
  body.mode-kids .card-wrap { height: 220px; perspective: none; }
  body.mode-kids .card-inner { transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: flat; }
  body.mode-kids .card-wrap.popping .card-inner { transform: scale(1.08); }
  body.mode-kids .card-wrap:hover .card-inner { transform: scale(1.04); }
  body.mode-kids .card-wrap.flipped .card-inner { transform: none; }
  body.mode-kids .card-face { background: #fff; border-radius: 22px; border: 3px solid #ffd9a8; box-shadow: 0 4px 0 #ffd9a8, 0 8px 20px rgba(255,154,122,0.15); padding: 18px 14px; backface-visibility: visible; position: relative; flex-direction: column; gap: 6px; }
  body.mode-kids .card-back { display: none; }
  body.mode-kids .card-wrap:hover .card-face { box-shadow: 0 6px 0 #ffd9a8, 0 12px 28px rgba(255,154,122,0.25); }

  /* Per-category pastel backgrounds */
  body.mode-kids .card-face.cat-Animals  { background: #e8f8e0; border-color: #a8d995; box-shadow: 0 4px 0 #a8d995, 0 8px 20px rgba(168,217,149,0.15); }
  body.mode-kids .card-face.cat-Food     { background: #fff0d4; border-color: #ffc97a; box-shadow: 0 4px 0 #ffc97a, 0 8px 20px rgba(255,201,122,0.18); }
  body.mode-kids .card-face.cat-Colours  { background: #ffe6f2; border-color: #ff9bcc; box-shadow: 0 4px 0 #ff9bcc, 0 8px 20px rgba(255,155,204,0.18); }
  body.mode-kids .card-face.cat-Numbers  { background: #e0effb; border-color: #88b8e8; box-shadow: 0 4px 0 #88b8e8, 0 8px 20px rgba(136,184,232,0.18); }
  body.mode-kids .card-face.cat-Body     { background: #ffe5e5; border-color: #ff9999; box-shadow: 0 4px 0 #ff9999, 0 8px 20px rgba(255,153,153,0.18); }
  body.mode-kids .card-face.cat-Family   { background: #f3e5ff; border-color: #c799f5; box-shadow: 0 4px 0 #c799f5, 0 8px 20px rgba(199,153,245,0.18); }
  body.mode-kids .card-face.cat-Nature   { background: #e0f5f5; border-color: #7fcaca; box-shadow: 0 4px 0 #7fcaca, 0 8px 20px rgba(127,202,202,0.18); }
  body.mode-kids .card-face.cat-Home     { background: #fff5e0; border-color: #ffcc70; box-shadow: 0 4px 0 #ffcc70, 0 8px 20px rgba(255,204,112,0.18); }
  body.mode-kids .card-face.cat-Clothes  { background: #f0e6ff; border-color: #b896f0; box-shadow: 0 4px 0 #b896f0, 0 8px 20px rgba(184,150,240,0.18); }
  body.mode-kids .card-face.cat-Transport{ background: #e0f0ff; border-color: #7ab8e8; box-shadow: 0 4px 0 #7ab8e8, 0 8px 20px rgba(122,184,232,0.18); }
  body.mode-kids .card-face.cat-Actions  { background: #fff0f5; border-color: #ff99bb; box-shadow: 0 4px 0 #ff99bb, 0 8px 20px rgba(255,153,187,0.18); }
  body.mode-kids .card-face.cat-Feelings { background: #fff8d4; border-color: #ffd966; box-shadow: 0 4px 0 #ffd966, 0 8px 20px rgba(255,217,102,0.18); }
  body.mode-kids .card-face.cat-Greetings{ background: #d4f5e8; border-color: #7accc7; box-shadow: 0 4px 0 #7accc7, 0 8px 20px rgba(122,204,199,0.18); }

  body.mode-kids .kid-emoji { font-size: 70px; line-height: 1; user-select: none; }
  body.mode-kids .kid-da { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; color: #2d2a4a; text-align: center; line-height: 1.1; }
  body.mode-kids .kid-en { font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #6b5b8a; text-align: center; opacity: 0; transition: opacity 0.25s; min-height: 18px; }
  body.mode-kids .card-wrap.flipped .kid-en { opacity: 1; }
  body.mode-kids .speaker-btn { position: absolute; top: 8px; right: 8px; width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.85); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; padding: 0; }
  body.mode-kids .speaker-btn:hover { transform: scale(1.15); }
  body.mode-kids .speaker-btn:active { transform: scale(0.92); }
  body.mode-kids .card-wrap.known .card-face::before { content: "⭐"; position: absolute; top: 8px; left: 10px; font-size: 18px; }
  body.mode-kids .known-dot { display: none; }

  /* Streak badge — inline in the header, kids mode only */
  .streak-badge { display: none; }
  body.mode-kids .streak-badge { display: inline-flex; align-items: center; gap: 5px; background: #fff; border: 2px solid #ffb84d; border-radius: 18px; padding: 4px 11px; font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 14px; color: #ff7a59; box-shadow: 0 2px 0 #ffb84d; user-select: none; }
  body.mode-kids .streak-badge.celebrate { animation: streakPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes streakPop { 0% { transform: scale(1); } 40% { transform: scale(1.35) rotate(-8deg); } 70% { transform: scale(1.1) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }

  /* Confetti */
  .confetti-piece { position: fixed; width: 10px; height: 14px; pointer-events: none; z-index: 9999; will-change: transform, opacity; }
  @keyframes confettiFall { 0% { transform: translate3d(0,0,0) rotate(0); opacity: 1; } 100% { transform: translate3d(var(--cx,40px), var(--cy,300px), 0) rotate(720deg); opacity: 0; } }

  /* FAB hidden in kids mode (kids tap cards directly) */
  body.mode-kids .fab { display: none; }

  /* EMPTY */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 9px 18px; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 28px rgba(0,0,0,0.45); z-index: 300; }
  .fab:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px 32px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); transform: scale(0.95); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .modal-btns button { flex: 1; padding: 9px; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
  .modal-cancel { background: var(--bg); color: var(--text-muted); }
  .modal-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .modal-confirm { background: var(--danger); border-color: var(--danger); color: white; font-weight: 500; }
  .modal-confirm:hover { opacity: 0.85; }

  @media (max-width: 700px) {
    :root { --sidebar-w: 0px; }
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .grid-container { padding: 10px 12px 80px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .topbar { padding: 10px 12px; }
    .section-heading { padding: 14px 12px 2px; }
    .progress-bar-wrap { padding: 6px 12px 0; }
    .stat-pill { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">dansk<span>ord</span></div>
  <div class="header-right">
    <div class="mode-toggle">
      <button id="mode-words-btn" class="active" onclick="setMode('words')">Words</button>
      <button id="mode-verbs-btn" onclick="setMode('verbs')">Verbs</button>
      <button id="mode-kids-btn" onclick="setMode('kids')">🌟 Kids</button>
    </div>
    <div class="streak-badge" id="streak-badge"><span>🔥</span><span id="streak-count">0</span></div>

// ── STATE ──────────────────────────────────────────────────────────
const KNOWN_KEY = { words: 'dk-known', verbs: 'dk-known-verbs', kids: 'dk-known-kids' };
let mode       = localStorage.getItem('dk-mode') || 'words';
if (!KNOWN_KEY[mode]) mode = 'words'; // guard against stale values
let known      = new Set(JSON.parse(localStorage.getItem(KNOWN_KEY[mode]) || '[]'));
let activeCat  = 'All';
let searchTerm = '';
let onlyKnown  = false;
let allFlipped = false;

// ── DATASET ACCESSORS ─────────────────────────────────────────────
function dataset() {
  if (mode === 'verbs') return verbs;
  if (mode === 'kids')  return KIDS;
  return words;
}
function catMeta() {
  if (mode === 'verbs') return CAT_META_VERBS;
  if (mode === 'kids')  return CAT_META_KIDS;
  return CAT_META;
}
function itemLabel() {
  if (mode === 'verbs') return 'verb';
  if (mode === 'kids')  return 'word';
  return 'word';
}

// ── BUILD SIDEBAR ─────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');

function buildSidebar() {
  // Clear all but the title row
  [...sidebar.querySelectorAll('.cat-item, .cat-divider')].forEach(n => n.remove());
  const data = dataset();
  const cats = ['All', ...[...new Set(data.map(w => w.cat))]];
  cats.forEach((cat, i) => {
    if (i === 1) {
      const div = document.createElement('div');
      div.className = 'cat-divider';
      sidebar.appendChild(div);
    }
    const count = cat === 'All' ? data.length : data.filter(w => w.cat === cat).length;
    const meta  = catMeta()[cat] || { icon:'📁' };
    const item  = document.createElement('div');
    item.className = 'cat-item' + (cat === activeCat ? ' active' : '');
    item.dataset.cat = cat;
    item.innerHTML = `<span class="cat-icon">${meta.icon}</span><span class="cat-name">${cat}</span><span class="cat-count">${count}</span>`;
    item.addEventListener('click', () => selectCat(cat));
    sidebar.appendChild(item);
  });
}

function selectCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-item').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === cat));
  allFlipped = false;
  applyFilters();
}

// ── MODE TOGGLE ───────────────────────────────────────────────────
function setMode(newMode) {
  if (newMode === mode) return;
  mode = newMode;
  localStorage.setItem('dk-mode', mode);
  // Switch known set
  known = new Set(JSON.parse(localStorage.getItem(KNOWN_KEY[mode]) || '[]'));
  // Reset transient view state
  activeCat = 'All';
  searchTerm = '';
  onlyKnown = false;
  allFlipped = false;
  document.getElementById('search').value = '';
  document.getElementById('known-filter-btn').classList.remove('active');
  applyModeClasses();
  refreshStreakBadge();
  buildSidebar();
  applyFilters();
}

function applyModeClasses() {
  document.getElementById('mode-words-btn').classList.toggle('active', mode === 'words');
  document.getElementById('mode-verbs-btn').classList.toggle('active', mode === 'verbs');
  document.getElementById('mode-kids-btn').classList.toggle('active',  mode === 'kids');
  document.body.classList.toggle('mode-verbs', mode === 'verbs');
  document.body.classList.toggle('mode-kids',  mode === 'kids');
}

// ── FILTERS ───────────────────────────────────────────────────────
function getFiltered() {
  const q = searchTerm.toLowerCase();
  return dataset().filter(w => {
    const matchCat = activeCat === 'All' || w.cat === activeCat;
    let matchSearch = !q || w.da.toLowerCase().includes(q) || w.en.toLowerCase().includes(q);
    if (!matchSearch && mode === 'verbs') {
      // Also search across verb conjugation forms
      matchSearch = (w.pres && w.pres.toLowerCase().includes(q))
                 || (w.past && w.past.toLowerCase().includes(q))
                 || (w.perf && w.perf.toLowerCase().includes(q));
    }
    const matchKnown = !onlyKnown || known.has(w.da);
    return matchCat && matchSearch && matchKnown;
  });
}

function applyFilters() { renderCards(getFiltered()); }

// ── RENDER ────────────────────────────────────────────────────────
function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const sectionLabel = mode === 'verbs' ? 'All Verbs' : (mode === 'kids' ? 'All Words' : 'All Words');
  document.getElementById('section-title').textContent =
    activeCat === 'All' ? sectionLabel : activeCat;
  document.getElementById('section-count').textContent =
    list.length + ' ' + itemLabel() + (list.length !== 1 ? 's' : '');
  document.getElementById('showing-count').textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No ${itemLabel()}s found.</p></div>`;
    updateStats();
    return;
  }

  const data = dataset();
  list.forEach(w => {
    const isKnown = known.has(w.da);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (isKnown ? ' known' : '');

    if (mode === 'kids') {
      // Kid card: emoji-first, audio-first, no flip — tap pops + speaks
      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front cat-${w.cat}">
            <button class="speaker-btn" type="button" aria-label="Play sound">🔊</button>
            <div class="kid-emoji">${w.emoji}</div>
            <div class="kid-da">${w.da}</div>
            <div class="kid-en">${w.en}</div>
          </div>
        </div>`;
      // Speaker button replays without re-popping
      wrap.querySelector('.speaker-btn').addEventListener('click', e => {
        e.stopPropagation();
        speak(w.da);
      });
      wrap.addEventListener('click', () => kidTap(wrap, w));
    } else if (mode === 'verbs') {
      const auxClass = (w.perf && w.perf.startsWith('er ')) ? 'aux-er' : '';
      // Strip leading "at " for speech — TTS pronounces the verb cleaner without the infinitive marker
      const spoken = w.da.replace(/^at\s+/, '');
      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front">
            <button class="adult-speaker-btn" type="button" aria-label="Play sound">🔊</button>
            <span class="card-num">#${data.indexOf(w)+1}</span>
            <div class="danish-word">${w.da}</div>
            <div class="word-type">verb</div>
            <div class="known-dot">✓</div>
          </div>
          <div class="card-face card-back">
            <div class="danish-word" style="font-size:18px;">${w.da}</div>
            <div class="verb-conj">
              <span class="verb-conj-label">pres</span><span class="verb-conj-form">${w.pres}</span>
              <span class="verb-conj-label">past</span><span class="verb-conj-form">${w.past}</span>
              <span class="verb-conj-label">perf</span><span class="verb-conj-form ${auxClass}">${w.perf}</span>
            </div>
            <div class="verb-en">${w.en}</div>
          </div>
        </div>`;
      wrap.querySelector('.adult-speaker-btn').addEventListener('click', e => {
        e.stopPropagation();
        speak(spoken);
      });
      wrap.addEventListener('click', () => toggleCard(wrap, w));
    } else {
      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front">
            <button class="adult-speaker-btn" type="button" aria-label="Play sound">🔊</button>
            <span class="card-num">#${data.indexOf(w)+1}</span>
            <div class="danish-word">${w.da}</div>
            <div class="word-type">${w.type}</div>
            <div class="known-dot">✓</div>
          </div>
          <div class="card-face card-back">
            <span class="card-num">${w.type}</span>
            <div class="english-word">${w.en}</div>
          </div>
        </div>`;
      wrap.querySelector('.adult-speaker-btn').addEventListener('click', e => {
        e.stopPropagation();
        speak(w.da);
      });
      wrap.addEventListener('click', () => toggleCard(wrap, w));
    }
    grid.appendChild(wrap);
  });
  updateStats();
}

function toggleCard(wrap, w) {
  const wasFlipped = wrap.classList.contains('flipped');
  wrap.classList.toggle('flipped');
  if (!wasFlipped) {
    known.add(w.da);
    wrap.classList.add('known');
    localStorage.setItem(KNOWN_KEY[mode], JSON.stringify([...known]));
    updateStats();
  }
}

// Kid tap: pop, speak Danish, confetti, mark known, second tap shows English
function kidTap(wrap, w) {
  const alreadyFlipped = wrap.classList.contains('flipped');
  // First tap shows English under the word, second tap hides it again
  wrap.classList.toggle('flipped');
  // Always pop + speak + chime, regardless of flip state
  wrap.classList.add('popping');
  setTimeout(() => wrap.classList.remove('popping'), 200);
  speak(w.da);
  playChime();
  fireConfetti(wrap);
  if (!known.has(w.da)) {
    known.add(w.da);
    wrap.classList.add('known');
    localStorage.setItem(KNOWN_KEY[mode], JSON.stringify([...known]));
    bumpStreak();
    updateStats();
  }
}

function flipAll() {
  const cards = document.querySelectorAll('.card-wrap');
  allFlipped = !allFlipped;
  cards.forEach(c => c.classList.toggle('flipped', allFlipped));
}

function shuffle() {
  renderCards(getFiltered().sort(() => Math.random() - 0.5));
}

function toggleKnownFilter() {
  onlyKnown = !onlyKnown;
  document.getElementById('known-filter-btn').classList.toggle('active', onlyKnown);
  applyFilters();
}

// ── RESET (no confirm() — uses custom modal) ───────────────────────
function openResetModal() {
  document.getElementById('modal-known-count').textContent = known.size;
  document.getElementById('resetModal').classList.add('open');
}
function closeResetModal() {
  document.getElementById('resetModal').classList.remove('open');
}
function confirmReset() {
  known.clear();
  localStorage.removeItem(KNOWN_KEY[mode]);
  closeResetModal();
  updateStats();
  applyFilters();
}

// close modal on overlay click
document.getElementById('resetModal').addEventListener('click', function(e) {
  if (e.target === this) closeResetModal();
});

function updateStats() {
  document.getElementById('known-count').textContent  = known.size;
  document.getElementById('total-count').textContent  = dataset().length;
  const pct = Math.round((known.size / dataset().length) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  applyFilters();
});

// ════════════════════════════════════════════════════════════════════
// KIDS MODE HELPERS — speech, confetti, chime, streak
// ════════════════════════════════════════════════════════════════════

// ── SPEECH ────────────────────────────────────────────────────────
// Picks first Danish voice once it's available; speaks short utterances.
// MUST be called synchronously inside a click handler (iOS gesture rule).
let _daVoice = null;
function pickDanishVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  // Prefer local (offline) voices first, then any da-* voice
  const local = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('da') && v.localService);
  if (local) return local;
  return voices.find(v => v.lang && v.lang.toLowerCase().startsWith('da')) || null;
}
if ('speechSynthesis' in window) {
  // Voices arrive asynchronously
  _daVoice = pickDanishVoice();
  speechSynthesis.addEventListener && speechSynthesis.addEventListener('voiceschanged', () => {
    _daVoice = pickDanishVoice();
  });
}
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel(); // Chrome stall fix
    if (!_daVoice) _daVoice = pickDanishVoice();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'da-DK';
    u.rate = 0.85;  // slightly slower for kid learners
    u.pitch = 1.05;
    if (_daVoice) u.voice = _daVoice;
    speechSynthesis.speak(u);
  } catch (e) { /* silent — speech is enhancement, not core */ }
}

// ── CHIME ─────────────────────────────────────────────────────────
let _audioCtx = null;
function playChime() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    // Two-note ding: rising fifth
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(ctx.destination);
      const start = now + i * 0.06;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.15, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.25);
      osc.start(start);
      osc.stop(start + 0.3);
    });
  } catch (e) { /* silent */ }
}

// ── CONFETTI ──────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#ff7a59','#ffd966','#7accc7','#c799f5','#88b8e8','#a8d995','#ff9bcc'];
function fireConfetti(originEl) {
  const rect = originEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const N = 18;
  for (let i = 0; i < N; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const angle = (Math.PI * 2 * i) / N + (Math.random() - 0.5) * 0.4;
    const dist = 90 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30; // upward bias
    piece.style.left = cx + 'px';
    piece.style.top = cy + 'px';
    piece.style.setProperty('--cx', dx + 'px');
    piece.style.setProperty('--cy', dy + 'px');
    piece.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    piece.style.animation = `confettiFall ${800 + Math.random() * 400}ms ease-out forwards`;
    piece.style.borderRadius = (Math.random() > 0.5 ? '50%' : '2px');
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 1300);
  }
}

// ── STREAK ────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function loadStreak() {
  try {
    return JSON.parse(localStorage.getItem('dk-kids-streak') || 'null') || { count: 0, lastDate: null };
  } catch { return { count: 0, lastDate: null }; }
}
function saveStreak(s) { localStorage.setItem('dk-kids-streak', JSON.stringify(s)); }
function bumpStreak() {
  const s = loadStreak();
  const today = todayKey();
  if (s.lastDate === today) return; // already counted today
  // Was yesterday? Then increment. Else reset to 1.
  const y = new Date(); y.setDate(y.getDate() - 1);
  const yKey = y.getFullYear() + '-' + String(y.getMonth()+1).padStart(2,'0') + '-' + String(y.getDate()).padStart(2,'0');
  s.count = (s.lastDate === yKey) ? s.count + 1 : 1;
  s.lastDate = today;
  saveStreak(s);
  refreshStreakBadge(true);
}
function refreshStreakBadge(celebrate) {
  const s = loadStreak();
  // Did the streak break? If lastDate is older than yesterday, show 0
  let display = s.count;
  if (s.lastDate) {
    const last = new Date(s.lastDate + 'T00:00:00');
    const today = new Date(todayKey() + 'T00:00:00');
    const diffDays = Math.round((today - last) / (1000 * 60 * 60 * 24));
    if (diffDays > 1) display = 0;
  } else {
    display = 0;
  }
  document.getElementById('streak-count').textContent = display;
  if (celebrate) {
    const badge = document.getElementById('streak-badge');
    badge.classList.remove('celebrate');
    void badge.offsetWidth; // restart animation
    badge.classList.add('celebrate');
  }
}

// init — restore mode from localStorage, then render
applyModeClasses();
refreshStreakBadge();
buildSidebar();
applyFilters();
</script>
