<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --sidebar-bg: #12171f;
    --card-front: #1c2333;
    --card-back: #1a2744;
    --border: #2a3347;
    --accent: #4f8ef7;
    --accent2: #7dd3fc;
    --text: #e8edf5;
    --text-muted: #8896ae;
    --text-dim: #4a5568;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 12px;
    --card-radius: 16px;
    --sidebar-w: 220px;
    --header-h: 58px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { height: var(--header-h); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; background: rgba(14,17,23,0.95); backdrop-filter: blur(12px); z-index: 200; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .stat-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
  .stat-pill b { color: var(--accent2); font-weight: 500; }
  .btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); padding: 6px 14px; font-family: 'Inter', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-shuffle { background: linear-gradient(135deg, #3b5fc0, #4f8ef7); border: none; color: white; }
  .btn-shuffle:hover { opacity: 0.88; color: white; }
  .btn-reset { border-color: #3a2020; }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

  /* SHELL */
  .shell { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); position: fixed; top: var(--header-h); left: 0; bottom: 0; overflow-y: auto; padding: 16px 0 40px; z-index: 100; }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar-title { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); padding: 0 16px 10px; }
  .cat-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; cursor: pointer; transition: background 0.12s; border-left: 3px solid transparent; gap: 8px; }
  .cat-item:hover { background: rgba(79,142,247,0.07); }
  .cat-item.active { background: rgba(79,142,247,0.12); border-left-color: var(--accent); }
  .cat-icon { font-size: 14px; flex-shrink: 0; }
  .cat-name { font-size: 12.5px; color: var(--text-muted); flex: 1; }
  .cat-item.active .cat-name { color: var(--accent2); font-weight: 500; }
  .cat-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); background: var(--surface); border-radius: 8px; padding: 1px 6px; flex-shrink: 0; }
  .cat-item.active .cat-count { background: rgba(79,142,247,0.2); color: var(--accent); }
  .cat-divider { height: 1px; background: var(--border); margin: 6px 16px; }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { position: sticky; top: var(--header-h); z-index: 90; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 10px; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 7px 10px 7px 32px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  /* PROGRESS */
  .progress-bar-wrap { padding: 8px 24px 0; background: var(--surface); border-bottom: 1px solid var(--border); }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
  .progress-track { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.35s ease; }

  /* SECTION HEADING */
  .section-heading { padding: 18px 24px 4px; display: flex; align-items: baseline; gap: 12px; }
  .section-heading h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); font-weight: 400; }
  .section-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

  /* GRID */
  .grid-container { padding: 12px 24px 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }

  /* FLIP CARD */
  .card-wrap { perspective: 800px; height: 148px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1); }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; border-radius: var(--card-radius); backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 14px; border: 1px solid var(--border); transition: border-color 0.2s, box-shadow 0.2s; }
  .card-wrap:hover .card-face { border-color: #3a4a66; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-front { background: var(--card-front); }
  .card-back { background: var(--card-back); transform: rotateY(180deg); border-color: #2a3d6a; }
  .card-wrap.flipped .card-back { border-color: var(--accent); }
  .danish-word { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); text-align: center; line-height: 1.2; margin-bottom: 5px; }
  .word-type { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .card-num { position: absolute; top: 9px; right: 11px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .english-word { font-size: 17px; font-weight: 500; color: var(--accent2); text-align: center; }
  .known-dot { position: absolute; bottom: 9px; right: 11px; width: 16px; height: 16px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #0a2010; opacity: 0; transition: opacity 0.25s; }
  .card-wrap.known .known-dot { opacity: 1; }

  /* EMPTY */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 9px 18px; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 28px rgba(0,0,0,0.45); z-index: 300; }
  .fab:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px 32px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); transform: scale(0.95); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .modal-btns button { flex: 1; padding: 9px; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
  .modal-cancel { background: var(--bg); color: var(--text-muted); }
  .modal-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .modal-confirm { background: var(--danger); border-color: var(--danger); color: white; font-weight: 500; }
  .modal-confirm:hover { opacity: 0.85; }

  @media (max-width: 700px) {
    :root { --sidebar-w: 0px; }
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .grid-container { padding: 10px 12px 80px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .topbar { padding: 10px 12px; }
    .section-heading { padding: 14px 12px 2px; }
    .progress-bar-wrap { padding: 6px 12px 0; }
    .stat-pill { display: none; }
  }
</style>
</head>

  "Pronouns":        { icon:"👤" },
  "Core Verbs":      { icon:"⚡" },

  "Prepositions":    { icon:"↔️" },
  "Phrases":         { icon:"💬" },
  "Shopping":        { icon:"🛒" },
  "Technology":      { icon:"💻" },
  "Society":         { icon:"🏛️" },
  "Arts & Leisure":  { icon:"🎭" },
  "Abstract & Misc": { icon:"📦" },
};

// ── STATE ──────────────────────────────────────────────────────────
let known      = new Set(JSON.parse(localStorage.getItem('dk-known') || '[]'));
let activeCat  = 'All';
let searchTerm = '';
let onlyKnown  = false;
let allFlipped = false;

// ── BUILD SIDEBAR ─────────────────────────────────────────────────
const cats = ['All', ...[...new Set(words.map(w => w.cat))]];
const sidebar = document.getElementById('sidebar');

cats.forEach((cat, i) => {
  if (i === 1) {
    const div = document.createElement('div');
    div.className = 'cat-divider';
    sidebar.appendChild(div);
  }
  const count = cat === 'All' ? words.length : words.filter(w => w.cat === cat).length;
  const meta  = CAT_META[cat] || { icon:'📁' };
  const item  = document.createElement('div');
  item.className = 'cat-item' + (cat === 'All' ? ' active' : '');
  item.dataset.cat = cat;
  item.innerHTML = `<span class="cat-icon">${meta.icon}</span><span class="cat-name">${cat}</span><span class="cat-count">${count}</span>`;
  item.addEventListener('click', () => selectCat(cat));
  sidebar.appendChild(item);
});

function selectCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-item').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === cat));
  allFlipped = false;
  applyFilters();
}

// ── FILTERS ───────────────────────────────────────────────────────
function getFiltered() {
  const q = searchTerm.toLowerCase();
  return words.filter(w => {
    const matchCat   = activeCat === 'All' || w.cat === activeCat;
    const matchSearch = !q || w.da.toLowerCase().includes(q) || w.en.toLowerCase().includes(q);
    const matchKnown  = !onlyKnown || known.has(w.da);
    return matchCat && matchSearch && matchKnown;
  });
}

function applyFilters() { renderCards(getFiltered()); }

// ── RENDER ────────────────────────────────────────────────────────
function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('section-title').textContent =
    activeCat === 'All' ? 'All Words' : activeCat;
  document.getElementById('section-count').textContent =
    list.length + ' word' + (list.length !== 1 ? 's' : '');
  document.getElementById('showing-count').textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No words found.</p></div>';
    return;
  }
  list.forEach(w => {
    const isKnown = known.has(w.da);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (isKnown ? ' known' : '');
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-num">#${words.indexOf(w)+1}</span>
          <div class="danish-word">${w.da}</div>
          <div class="word-type">${w.type}</div>
          <div class="known-dot">✓</div>
        </div>
        <div class="card-face card-back">
          <span class="card-num">${w.type}</span>
          <div class="english-word">${w.en}</div>
        </div>
      </div>`;
    wrap.addEventListener('click', () => toggleCard(wrap, w));
    grid.appendChild(wrap);
  });
  updateStats();
}

function toggleCard(wrap, w) {
  const wasFlipped = wrap.classList.contains('flipped');
  wrap.classList.toggle('flipped');
  if (!wasFlipped) {
    known.add(w.da);
    wrap.classList.add('known');
    localStorage.setItem('dk-known', JSON.stringify([...known]));
    updateStats();
  }
}

function flipAll() {
  const cards = document.querySelectorAll('.card-wrap');
  allFlipped = !allFlipped;
  cards.forEach(c => c.classList.toggle('flipped', allFlipped));
}

function shuffle() {
  renderCards(getFiltered().sort(() => Math.random() - 0.5));
}

function toggleKnownFilter() {
  onlyKnown = !onlyKnown;
  document.getElementById('known-filter-btn').classList.toggle('active', onlyKnown);
  applyFilters();
}

// ── RESET (no confirm() — uses custom modal) ───────────────────────
function openResetModal() {
  document.getElementById('modal-known-count').textContent = known.size;
  document.getElementById('resetModal').classList.add('open');
}
function closeResetModal() {
  document.getElementById('resetModal').classList.remove('open');
}
function confirmReset() {
  known.clear();
  localStorage.removeItem('dk-known');
  closeResetModal();
  updateStats();
  applyFilters();         // re-renders cards without .known class
}

// close modal on overlay click
document.getElementById('resetModal').addEventListener('click', function(e) {
  if (e.target === this) closeResetModal();
});

function updateStats() {
  document.getElementById('known-count').textContent  = known.size;
  document.getElementById('total-count').textContent  = words.length;
  const pct = Math.round((known.size / words.length) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  applyFilters();
});

// init
applyFilters();
